<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Round Tracker</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>
   <!-- NAV -->
    <nav>
        <h1>Golf Tracker</h1>

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="tracker.html">Tracker</a></li>
            <li><a href="about.html">About</a></li>
        </ul>
    </nav>
 <!-- TRACKER -->
    <main class="tracker-section">

        <h2>Enter Round Information</h2>

        <form id="scoreForm">

            <label>Player Name</label>
            <input type="text" id="playerName" required>

            <label>Golf Course</label>
            <input type="text" id="courseName" required>

            <label>Round Score</label>
            <input type="number" id="scoreInput" required>

            <button type="submit">
                Save Round
            </button>

        </form>
  <!-- STATS -->
        <section class="stats">

            <div class="stat-box">
                <h3>Average Score</h3>
                <p id="averageScore">0</p>
            </div>

            <div class="stat-box">
                <h3>Estimated Handicap</h3>
                <p id="handicap">0</p>
            </div>

        </section>

        <!-- TABLE -->
        <table>

            <thead>
                <tr>
                    <th>Player</th>
                    <th>Course</th>
                    <th>Score</th>
                </tr>
            </thead>

            <tbody id="scoreTable">

            </tbody>

        </table>

    </main>

    <script src="script.js"></script>

</body>
</html>
